# Daily arXiv Agent Configuration

# 应用配置 / App settings
app:
  # 部署语言 / Deployment language: zh 或 en
  language: "zh"

# arXiv 搜索配置 / arXiv search settings
arxiv:
  # 研究领域类别（可以是多个）/ Research categories (multiple allowed)
  # 当前方向: 强化学习 + 博弈 + 虚拟电厂 / Current focus: RL + game theory + virtual power plants
  categories:
    - "eess.SY"  # Systems and Control / Power Systems
    - "cs.LG"    # Machine Learning / Reinforcement Learning
    - "cs.MA"    # Multiagent Systems
    - "cs.GT"    # Computer Science and Game Theory
    - "cs.AI"    # Artificial Intelligence
  
  # 精细交叉关键词：组内 OR，组间 AND / Fine-grained intersection: OR within groups, AND across groups
  keyword_groups:
    - name: "virtual_power_plant_and_energy_system"
      terms:
        - "virtual power plant"
        - "virtual power plants"
        - "VPP"
        - "distributed energy resource"
        - "distributed energy resources"
        - "energy management"
        - "electricity market"
        - "demand response"
        - "microgrid"
        - "power system"
    - name: "reinforcement_learning"
      terms:
        - "reinforcement learning"
        - "deep reinforcement learning"
        - "multi-agent reinforcement learning"
        - "MARL"
        - "Markov decision process"
        - "MDP"
    - name: "game_and_market_mechanism"
      terms:
        - "game theory"
        - "game-theoretic"
        - "Stackelberg"
        - "Nash"
        - "auction"
        - "bidding"
        - "market mechanism"
  # 兼容旧逻辑的宽泛关键词；当 keyword_groups 存在时不会使用 / Legacy broad keywords; ignored when keyword_groups is set
  keywords: []
  
  # 每天获取的最大论文数量 / Maximum papers fetched per day
  max_results: 20
  days_back: 30
  fallback_days_back: 365
  
  # 排序方式 / Sort by: submittedDate (提交日期) 或 relevance (相关性)
  sort_by: "relevance"
  
  # 排序顺序 / Sort order: descending 或 ascending
  sort_order: "descending"

# LLM 配置 / LLM settings
llm:
  # 提供商 / Provider: openai, gemini, claude, deepseek, vllm
  provider: "deepseek"
  
  # OpenAI 配置 / OpenAI settings
  openai:
    api_key: ""  # 在 .env 文件中设置 / Set in .env file
    model: "gpt-4o-mini"  # gpt-4, gpt-4o, gpt-3.5-turbo
    base_url: ""  # 可选，用于代理或自定义端点 / Optional for proxy or custom endpoint
    temperature: 0.2
    max_tokens: 8192
  
  # Google Gemini 配置 / Google Gemini settings
  gemini:
    api_key: ""  # 在 .env 文件中设置 / Set in .env file
    model: "gemini-1.5-flash"  # gemini-pro, gemini-1.5-flash, gemini-1.5-pro
    temperature: 0.2
    max_tokens: 8192
  
  # Anthropic Claude 配置 / Anthropic Claude settings
  claude:
    api_key: ""  # 在 .env 文件中设置 / Set in .env file
    model: "claude-3-5-sonnet-20241022"  # claude-3-opus, claude-3-sonnet, claude-3-haiku
    temperature: 0.2
    max_tokens: 8192
  
  # DeepSeek 配置 / DeepSeek settings
  deepseek:
    api_key: ""  # 在 .env 文件中设置 / Set in .env file
    model: "deepseek-chat"  # deepseek-chat, deepseek-coder
    base_url: "https://api.deepseek.com/v1"
    temperature: 0.2
    max_tokens: 8192
  
  # vLLM（OpenAI 兼容 API）/ vLLM (OpenAI-compatible API)
  vllm:
    api_key: "EMPTY"  # vLLM 通常不需要 API Key / vLLM usually does not require a real API key
    model: "gpt-oss-120b"  # 你部署的模型名称 example: gpt-oss-120b
    base_url: "http://172.24.128.111:30207/v1"  # vLLM 服务地址 example: http://172.24.128.111:30207/v1
    temperature: 0.2
    max_tokens: 8192

# Web 服务配置 / Web service settings
web:
  host: "0.0.0.0"
  port: 5000
  debug: true
  title: "Daily arXiv - Research Tracker"
  # Web 描述 / Web description
  description: "每日追踪最新的研究论文"

# 调度配置 / Scheduler settings
scheduler:
  # 是否启用自动调度 / Enable automatic scheduling
  enabled: true
  
  # 运行时间（24小时制，HH:MM 格式）/ Run time (24-hour format, HH:MM)
  run_time: "09:00"
  
  # 时区 / Timezone
  timezone: "Asia/Shanghai"
  
  # 启动时是否立即运行一次 / Run once on startup
  run_on_start: true
  
  # 邮件通知配置（可选）/ Email notification settings (optional)
  notification:
    enabled: false
    email:
      smtp_server: "smtp.gmail.com"
      smtp_port: 587
      sender: ""  # 发件人邮箱 / Sender email
      password: ""  # 在 .env 文件中设置 EMAIL_PASSWORD / Set EMAIL_PASSWORD in .env
      recipients:  # 收件人列表 / Recipient list
        - "your-email@example.com"
      on_success: true  # 成功时发送通知 / Notify on success
      on_failure: true  # 失败时发送通知 / Notify on failure

# 数据存储配置 / Data storage settings
storage:
  # 存储类型 / Storage type: json 或 sqlite
  type: "json"
  
  # JSON 存储路径 / JSON storage path
  json_path: "data/papers"
  
  # SQLite 数据库路径 / SQLite database path
  sqlite_path: "data/arxiv.db"
  
  # 保留历史数据的天数（0 表示永久保留）/ Retention days (0 means keep forever)
  retention_days: 30

# 日志配置 / Logging settings
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/daily_arxiv.log"
  console: true
